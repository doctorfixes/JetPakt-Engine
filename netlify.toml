# Netlify build config for JetPakt marketing site
# The repo root contains the Python Pulse engine; the site is a static folder at jetpakt-site/.

[build]
  base    = "jetpakt-site"
  publish = "."

[build.environment]
  # Static-only site — no build step needed. Netlify just publishes the folder.
  NETLIFY_USE_YARN = "false"

# Security headers — reasonable defaults for a static marketing site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "geolocation=(), microphone=(), camera=()"

# Long cache for static assets, short cache for HTML
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ------------------------------------------------------------------------------
# Netlify Forms
# The preview-inquiry form is auto-detected from inquiry.html via the
# data-netlify="true" attribute. No TOML config is required for detection.
#
# Email notification to gojetpakt.us@outlook.com is configured in the Netlify
# UI at: Project configuration > Notifications > Form submission notifications.
# Event: "New form submission" -> Form: preview-inquiry -> Email: gojetpakt.us@outlook.com.
# ------------------------------------------------------------------------------
